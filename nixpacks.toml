# nixpacks.toml - Configuração Nixpacks para ERP Principal
# Para sistemafinanceirodwm-production.up.railway.app

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[phases.install]
cmds = ["pip install --upgrade pip setuptools wheel", "pip install -r requirements.txt"]

[phases.build]
cmds = []

[start]
cmd = "python web_server.py"
