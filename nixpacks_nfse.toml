# nixpacks.toml - Configuração do Nixpacks para Railway
# NOTA: Railway agora usa Railpack por padrão. Este arquivo é mantido para compatibilidade.
# Para o microserviço NFS-e, configure no Railway Dashboard:
# - Build Command: pip install -r requirements_nfse.txt
# - Start Command: gunicorn app_nfse:app --bind 0.0.0.0:$PORT --workers 2 --timeout 1800 --log-level info

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[phases.install]
cmds = [
  "pip install --upgrade pip setuptools wheel",
  "pip install -r requirements_nfse.txt"
]

[start]
cmd = "gunicorn app_nfse:app --bind 0.0.0.0:$PORT --workers 2 --timeout 1800 --log-level info"
