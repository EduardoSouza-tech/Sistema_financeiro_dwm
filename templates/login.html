<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSRF Token -->
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Login - Sistema Financeiro DWM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .login-container {
            /* Vidro Transparente Limpo */
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37),
                        0 20px 60px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            background: rgba(255, 255, 255, 0.08);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .login-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .login-body {
            padding: 40px 30px;
            background: transparent;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: white;
            font-weight: 500;
            font-size: 14px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }
        
        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .form-group input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.1);
        }

        .form-group input:disabled {
            background: rgba(255, 255, 255, 0.1);
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.35);
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.3);
        }

        .btn-login:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .alert {
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            animation: slideDown 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-error {
            background: rgba(254, 238, 238, 0.9);
            color: #c33;
            border: 1px solid rgba(255, 204, 204, 0.5);
        }

        .alert-success {
            background: rgba(238, 255, 238, 0.9);
            color: #3c3;
            border: 1px solid rgba(204, 255, 204, 0.5);
        }

        .alert-info {
            background: rgba(238, 238, 255, 0.9);
            color: #33c;
            border: 1px solid rgba(204, 204, 255, 0.5);
        }

        .login-footer {
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
        }

        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .password-toggle {
            position: relative;
        }

        .password-toggle button {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            cursor: pointer;
            color: white;
            font-size: 18px;
            padding: 5px;
            transition: all 0.3s;
        }

        .password-toggle button:hover {
            background: rgba(255, 255, 255, 0.3);
            color: white;
        }

        .version-info {
            margin-top: 10px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        /* Modal de Seleção de Empresa */
        .empresa-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .empresa-modal {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            max-width: 450px;
            max-height: 85vh;
            width: 90%;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            animation: slideIn 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .empresa-modal-header {
            background: rgba(255, 255, 255, 0.08);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 25px;
            border-radius: 15px 15px 0 0;
            text-align: center;
        }

        .empresa-modal-header h2 {
            margin: 0;
            font-size: 22px;
        }

        .empresa-modal-body {
            padding: 30px;
            padding-bottom: 20px;
            background: transparent;
            display: flex;
            flex-direction: column;
            max-height: calc(85vh - 150px);
        }
        
        #empresasList {
            overflow-y: auto;
            margin-bottom: 20px;
            flex: 1;
            min-height: 0;
        }
        
        /* Scrollbar customizada para a lista */
        #empresasList::-webkit-scrollbar {
            width: 8px;
        }
        
        #empresasList::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin: 5px 0;
        }
        
        #empresasList::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }
        
        #empresasList::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .empresa-option {
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .empresa-option:hover {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.2);
        }

        .empresa-option.selected {
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
        }

        .empresa-icon {
            font-size: 24px;
        }

        .empresa-info {
            flex: 1;
        }

        .empresa-nome {
            font-weight: 600;
            color: white;
            font-size: 16px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .empresa-papel {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 3px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .btn-confirm-empresa {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
        }

        .btn-confirm-empresa:hover {
            background: rgba(255, 255, 255, 0.35);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.3);
        }

        .btn-confirm-empresa:disabled {
            background: rgba(255, 255, 255, 0.1);
            cursor: not-allowed;
            opacity: 0.5;
        }
        
        /* Animações de Ocultar/Mostrar Login */
        .login-container.hidden {
            animation: fadeOutDown 0.3s ease forwards;
            pointer-events: none;
        }
        
        .login-container.visible {
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeOutDown {
            from {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            to {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
        }
        
        .empresa-modal-overlay.show {
            display: flex !important;
            animation: overlayFadeIn 0.3s ease;
        }
        
        @keyframes overlayFadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <!-- Modal de Seleção de Empresa -->
    <div class="empresa-modal-overlay" id="empresaModalOverlay">
        <div class="empresa-modal">
            <div class="empresa-modal-header">
                <h2>🏢 Selecione uma Empresa</h2>
                <p style="margin: 5px 0 0 0; font-size: 13px; opacity: 0.9;">Escolha qual empresa deseja acessar</p>
            </div>
            <div class="empresa-modal-body">
                <div id="empresasList"></div>
                <button id="btnConfirmEmpresa" class="btn-confirm-empresa" onclick="confirmEmpresaSelection()" disabled>
                    Confirmar Seleção
                </button>
            </div>
        </div>
    </div>

    <div class="login-container visible" id="loginContainer">
        <div class="login-header">
            <h1>💼 Sistema Financeiro DWM</h1>
            <p>Faça login para continuar</p>
        </div>

        <div class="login-body">
            <div id="alert" class="alert"></div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Digite seu usuário"
                        required
                        autocomplete="username"
                        autofocus
                    >
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <div class="password-toggle">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Digite sua senha"
                            required
                            autocomplete="current-password"
                        >
                        <button type="button" onclick="togglePassword()" title="Mostrar/Ocultar senha">
                            👁️
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">
                    Entrar
                </button>
            </form>
        </div>
    </div>

    <script>
        function showAlert(message, type = 'error') {
            const alert = document.getElementById('alert');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alert.style.display = 'block';

            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const button = event.target;
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                button.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                button.textContent = '👁️';
            }
        }

        async function handleLogin(event) {
            event.preventDefault();

            const btnLogin = document.getElementById('btnLogin');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showAlert('Por favor, preencha todos os campos', 'error');
                return;
            }

            // Desabilitar form
            btnLogin.disabled = true;
            btnLogin.innerHTML = '<span class="loading"></span> Entrando...';
            document.getElementById('username').disabled = true;
            document.getElementById('password').disabled = true;

            try {
                // Obter CSRF token
                const csrfToken = document.querySelector('meta[name="csrf-token"]').content;
                
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include'  // Importante para cookies
                });

                const result = await response.json();

                if (result.success) {
                    // Guardar dados no localStorage
                    localStorage.setItem('usuario', JSON.stringify(result.usuario));
                    localStorage.setItem('permissoes', JSON.stringify(result.permissoes));

                    // Verificar se precisa selecionar empresa
                    if (result.require_empresa_selection && result.empresas_disponiveis && result.empresas_disponiveis.length > 1) {
                        // Mostrar modal de seleção de empresa
                        showEmpresaSelectionModal(result.empresas_disponiveis);
                    } else {
                        // Redirecionar diretamente
                        showAlert('Login realizado com sucesso! Redirecionando...', 'success');
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 1000);
                    }
                } else {
                    showAlert(result.error || 'Erro ao fazer login', 'error');
                    
                    // Reabilitar form
                    btnLogin.disabled = false;
                    btnLogin.textContent = 'Entrar';
                    document.getElementById('username').disabled = false;
                    document.getElementById('password').disabled = false;
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            } catch (error) {
                console.error('Erro ao fazer login:', error);
                showAlert('Erro de conexão com o servidor', 'error');
                
                // Reabilitar form
                btnLogin.disabled = false;
                btnLogin.textContent = 'Entrar';
                document.getElementById('username').disabled = false;
                document.getElementById('password').disabled = false;
            }
        }

        // Verificar se já está logado
        window.addEventListener('load', async () => {
            try {
                const response = await fetch('/api/auth/verify', {
                    credentials: 'include'
                });
                
                const result = await response.json();
                
                if (result.success && result.authenticated) {
                    showAlert('Você já está logado! Redirecionando...', 'info');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                }
            } catch (error) {
                console.log('Não autenticado');
            }
        });

        // Variável para armazenar empresas disponíveis
        let availableEmpresas = [];
        let selectedEmpresaId = null;

        // Mostrar modal de seleção de empresa
        function showEmpresaSelectionModal(empresas) {
            availableEmpresas = empresas;
            const empresasList = document.getElementById('empresasList');
            empresasList.innerHTML = '';

            empresas.forEach(empresa => {
                const div = document.createElement('div');
                div.className = 'empresa-option';
                div.onclick = () => selectEmpresa(empresa.id);
                
                const papelBadge = empresa.papel === 'admin_empresa' ? '👑 Admin' : 
                                   empresa.papel === 'usuario' ? '👤 Usuário' : 
                                   '👁️ Visualizador';
                
                div.innerHTML = `
                    <div class="empresa-icon">🏢</div>
                    <div class="empresa-info">
                        <div class="empresa-nome">${empresa.razao_social || empresa.nome || 'Empresa sem nome'}</div>
                        <div class="empresa-papel">${papelBadge}${empresa.is_padrao ? ' • ⭐ Padrão' : ''}</div>
                    </div>
                `;
                
                empresasList.appendChild(div);
            });

            // Ocultar login com animação
            const loginContainer = document.querySelector('.login-container');
            loginContainer.classList.add('hidden');
            loginContainer.classList.remove('visible');
            
            // Aguardar animação de fade out antes de mostrar modal
            setTimeout(() => {
                const overlay = document.getElementById('empresaModalOverlay');
                overlay.classList.add('show');
                overlay.style.display = 'flex';
            }, 300);
            
            // Ocultar botões de login
            document.getElementById('btnLogin').style.display = 'none';
        }

        // Selecionar empresa no modal
        function selectEmpresa(empresaId) {
            selectedEmpresaId = empresaId;
            
            // Atualizar visual
            document.querySelectorAll('.empresa-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
            
            // Habilitar botão de confirmar
            document.getElementById('btnConfirmEmpresa').disabled = false;
        }

        // Confirmar seleção de empresa
        async function confirmEmpresaSelection() {
            if (!selectedEmpresaId) return;

            const btnConfirm = document.getElementById('btnConfirmEmpresa');
            btnConfirm.disabled = true;
            btnConfirm.innerHTML = '<span class="loading"></span> Carregando...';

            try {
                const csrfToken = document.querySelector('meta[name="csrf-token"]').content;
                
                const response = await fetch('/api/auth/switch-empresa', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify({ empresa_id: selectedEmpresaId }),
                    credentials: 'include'
                });

                const result = await response.json();

                if (result.success) {
                    // Atualizar localStorage com novas permissões
                    if (result.permissoes) {
                        localStorage.setItem('permissoes', JSON.stringify(result.permissoes));
                    }
                    
                    // Atualizar dados da empresa no localStorage
                    const usuarioData = JSON.parse(localStorage.getItem('usuario') || '{}');
                    if (result.empresa) {
                        usuarioData.empresa_atual = result.empresa;
                    }
                    localStorage.setItem('usuario', JSON.stringify(usuarioData));
                    
                    showAlert('Empresa selecionada com sucesso! Redirecionando...', 'success');
                    
                    // Fechar modal
                    const overlay = document.getElementById('empresaModalOverlay');
                    overlay.classList.remove('show');
                    setTimeout(() => {
                        overlay.style.display = 'none';
                    }, 300);
                    
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    showAlert(result.error || 'Erro ao selecionar empresa', 'error');
                    btnConfirm.disabled = false;
                    btnConfirm.textContent = 'Confirmar Seleção';
                }
            } catch (error) {
                console.error('Erro ao selecionar empresa:', error);
                showAlert('Erro de conexão com o servidor', 'error');
                btnConfirm.disabled = false;
                btnConfirm.textContent = 'Confirmar Seleção';
            }
        }
    </script>

    <!-- Rodapé -->
    <footer style="
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 20px;
        text-align: center;
        color: rgba(255, 255, 255, 0.9);
        font-size: 13px;
        background: rgba(0, 0, 0, 0.1);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
    ">
        © 2026 DWM Systems Developer. Todos os direitos reservados.
    </footer>
</body>
</html>
